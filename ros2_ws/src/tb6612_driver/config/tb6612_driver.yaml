tb6612_driver_node:
  ros__parameters:
    # Choose the correct gpiochip for your pins:
    #   Pi 5 often exposes RP1 GPIO as "gpiochip4" (check with `gpioinfo`)
    gpiochip: "/dev/gpiochip4"

    # Line offsets (normally equal to BCM numbers on that chip)
    ain1: 5
    ain2: 6
    pwma: 12
    bin1: 16
    bin2: 24
    pwmb: 13
    stby: 25         # -1 if not wired

    # Software PWM frequency (start modest; raise if quiet/jitter acceptable)
    pwm_frequency_hz: 400