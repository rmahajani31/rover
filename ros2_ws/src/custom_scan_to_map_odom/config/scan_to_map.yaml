custom_scan_to_map_odom:
  ros__parameters:
    input_topic: "/custom/points_preprocessed"
    odom_topic: "/custom/scan_to_map_odom"
    path_topic: "/custom/scan_to_map_path"
    local_map_topic: "/custom/local_map"
    diagnostics_topic: "/custom/scan_to_map_diagnostics"

    odom_frame: "odom"
    base_frame: "base_link"
    lidar_frame: "livox_frame"
    publish_tf: false
    constrain_to_planar: true
    stop_tf_on_tracking_degraded: true
    tf_publish_rate_hz: 20.0
    max_consecutive_tracking_failures: 3

    # Current scan filtering
    scan_voxel_leaf_size: 0.20
    min_range: 0.30
    max_range: 30.0
    max_points_per_scan: 3000

    # Optimization
    max_iterations: 5
    min_valid_correspondences: 100
    convergence_translation_epsilon: 0.001
    convergence_rotation_epsilon: 0.001
    max_pose_update_translation: 0.40
    max_pose_update_rotation_deg: 20.0

    # Nearest neighbor and plane fitting
    k_neighbors: 5
    max_neighbor_distance: 1.0
    max_plane_error: 0.10
    max_point_to_plane_residual: 0.50
    min_plane_eigen_ratio: 5.0

    # Local map
    local_map:
      cube_size_x: 40.0
      cube_size_y: 40.0
      cube_size_z: 8.0
      movement_threshold_xy: 5.0
      movement_threshold_z: 2.0
      voxel_leaf_size: 0.20
      publish_local_map: true
      local_map_publish_period_sec: 1.0

    # Publishing
    max_path_poses: 2000
    publish_path: true
    # Disabled until the scan-to-map diagnostics crash is fixed; odometry/local map still run.
    publish_diagnostics: false

    # IMU propagation for Phase 8 initial-guess support.
    # This pass only buffers IMU inside the scan-to-map node; optimizer initial guess is unchanged.
    use_imu_initial_guess: true
    use_imu_rotation: true
    use_imu_translation: false
    imu_topic: "/livox/imu"
    max_imu_buffer_seconds: 5.0
    max_allowed_imu_gap: 0.02
    max_expected_yaw_change_deg_per_scan: 30.0
    gravity: [0.0, 0.0, -9.81]
    gyro_bias: [0.0, 0.0, 0.0]
    accel_bias: [0.0, 0.0, 0.0]
    imu_accel_scale: 9.80665
