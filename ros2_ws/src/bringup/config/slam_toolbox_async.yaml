slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_link

    # If your scan topic is not /scan, change this
    scan_topic: /scan

    # Good starter toggles
    mode: mapping
    publish_tf: true
    transform_publish_period: 0.02
    transform_timeout: 0.5

    # Update thresholds - Lowering these is the #1 fix
    minimum_travel_distance: 0.1    # Update every 10cm
    minimum_travel_heading: 0.1     # Update every ~6 degrees
    
    # Scan Matching - This helps "snap" the scan to the wall
    resolution: 0.05
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1 

    # Trust settings (Correlation Penalties)
    # Increase these if the map "jumps" too much; decrease if walls are fuzzy
    distance_variance_penalty: 0.5      
    angle_variance_penalty: 0.5    

    # Matcher trust
    fine_search_angle_offset: 0.00349   # Small refinement search
    coarse_search_angle_offset: 0.349   
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # Mapping quality vs compute (start here; tune later)
    min_laser_range: 0.1
    max_laser_range: 16.0

    # Loop closure behavior
    do_loop_closing: true