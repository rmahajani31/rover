encoder_odom:
  ros__parameters:
    wheel_radius_m: 0.04
    wheel_separation_m: 0.5
    ticks_per_rev: 3459.0
    tick_deadband: 2.0  # Ignore encoder changes smaller than this (in ticks) to prevent creep
    left_dir: 1.0      # Set to -1.0 if left encoder direction is reversed
    right_dir: 1.0     # Set to -1.0 if right encoder direction is reversed

transforms:
  base_to_laser:
    x: 0.0
    y: 0.0
    z: 0.2032
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    parent_frame: "base_link"
    child_frame: "laser"
  
  base_to_camera:
    x: 0.0
    y: 0.2159
    z: 0.1651
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    parent_frame: "base_link"
    child_frame: "camera_link"

