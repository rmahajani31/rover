ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Publish fused output + TF
    publish_tf: true
    publish_acceleration: false

    # ---------- INPUT 1: Wheel odometry ----------
    odom0: /wheel_odom
    odom0_config: [
      true,  true,  false,   # x, y, z
      false, false, false,    # roll, pitch, yaw
      true,  false,  false,   # vx, vy, vz
      false, false, false,    # vroll, vpitch, vyaw
      false, false, false    # ax, ay, az
    ]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # For many wheel odom sources: pose is ok, twist is ok.
    # If your wheel odom yaw is bad (common), you can turn yaw off above
    # and let IMU provide yaw.

    # ---------- INPUT 2: IMU ----------
    imu0: /oak/imu/data
    imu0_config: [
      false, false, false,   # x, y, z
      false, false, false,    # roll, pitch, yaw  (2D mode uses yaw mainly)
      false, false, false,   # vx, vy, vz
      true, true, true,    # vroll, vpitch, vyaw (use yaw rate if available)
      false, false, false    # ax, ay, az
    ]
    imu0_queue_size: 10

    imu0_remove_gravitational_acceleration: true